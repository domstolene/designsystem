name: 'Chromatic'

on:
  push:
    paths-ignore:
      - '.prettierrc'
      - '.*ignore'
      - 'eslint.config.mjs'
      - 'renovate.json'
      - 'turbo.json'
      - 'opencode.jsonc'
      - '**/*.yaml'
      - '**/*.yml'
      - '**/*.md'
      - '**/*.mdx'
      - '**/vitest.config.ts'
      - '**/tsdown.config.ts'
      - '**/*.spec.tsx'
      - '.github/**'
      - '.changeset/**'
      - 'packages/dds-formatting/**'
      - 'packages/storybook-components/**'
      - '.storybook/manager*'

jobs:
  chromatic:
    if: github.actor != 'dependabot[bot]'
    name: Run Chromatic
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
