packages:
  - 'packages/*'

strictPeerDependencies: false
autoInstallPeers: true
enablePrePostScripts: true

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  unrs-resolver: true

overrides:
  react: 19.2.7
  react-dom: 19.2.7
  esbuild@>=0.27.3 <0.28.1: ^0.28.1

minimumReleaseAgeExclude:
  - esbuild@0.28.1
  - js-yaml@3.15.0 || 4.1.2 || 4.3.0
  - brace-expansion@1.1.16 || 2.1.2
  - immutable@5.1.8
