packages:
  - 'packages/*'

minimumReleaseAge: 0

strictPeerDependencies: false
autoInstallPeers: true
enablePrePostScripts: true

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  unrs-resolver: true

overrides:
  react: 19.2.5
  react-dom: 19.2.5
  'glob@>=10.2.0 <10.5.0': '>=10.5.0'
  'flatted@<=3.4.1': '>=3.4.2'
  'picomatch@<2.3.2': '>=2.3.2'
  'picomatch@>=4.0.0 <4.0.4': '>=4.0.4'
  'yaml@>=1.0.0 <1.10.3': '>=1.10.3'
  'yaml@>=2.0.0 <2.8.3': '>=2.8.3'
